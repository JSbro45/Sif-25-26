<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalFest - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: cornflowerblue;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #080d3a;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #071347;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #ffffff;
            color: #080d3a;
            border: #080d3a 1px solid;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Přidat pin</h1>
        <form>
            <div class="form-group">
                <label for="text">Název koncertu:</label>
                <input type="text" id="NK" name="NK" required>
            </div>
            <div class="form-group">
                <label for="text">Foto:</label>
                <input type="file" id="F" name="F" required>
            </div>
            <div class="form-group">
                <label for="text">Odkaz na stránky/youtube interpreta:</label>
                <input type="text" id="OS" name="OS" required>
            </div>
             <div class="form-group">
                <label for="text">Žánr</label>
                <input type="text" id="Z" name="Z" required>
            </div>
             <div class="form-group">
                <label for="text">Datum konání:</label>
                <input type="text" id="DK" name="DK" required>
            </div>
             <div class="form-group">
                <label for="text">Čas konání:</label>
                <input type="text" id="CK" name="CK" required>
            </div>
            <div class="form-group">
                <label for="text">Vstupné:</label>
                <input type="text" id="V" name="V" required>
            </div>
            <div class="form-group">
                <label for="text">Web pro koupi vstupenek:</label>
                <input type="text" id="WPV" name="WPV" required>
            </div>
            <div class="form-group">
                <label for="text">Název místa konání:</label>
                <input type="text" id="NMK" name="NMK" required>
            </div>
            <div class="form-group">
                <label for="text">Adresa místa konání:</label>
                <input type="text" id="AMK" name="AMK" required>
            </div>
            <div class="form-group">
                <label for="text">Web místa konání:</label>
                <input type="text" id="WMK" name="WMK" required>
            </div>
            <button type="submit">Přidat</button>
        </form>
    </div>

    <script>
        
    </script>
</body>
</html>
