<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalFest - Sign in </title>
      <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #165810 0%, #1234cf 100%);
        }
        .signin-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1, p {
            text-align: center;
            color: #080d3a;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #071347;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #ffffff;
            color: #080d3a;
            border: #080d3a 1px solid;
        }
    </style>
</head>

<body>
    <div class="signin-container">
        <h1>Změnit údaje</h1>
        <p>Přepište své údaje níže a potvrďte změny:</p>
        <form>
            <div class="form-group">
                <label for="email">Email:<a style="color: darkred;"><b>*</b></a></label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone-number">Tel. číslo:<a style="color: darkred;"><b>*</b></a></label>
                <input type="tel" id="phone-number" name="phone-number" required>
            </div>
            <div class="form-group" id="passwrd">
                <label for="password">Heslo:<a style="color: darkred;"><b>*</b></a></label>
                <input type="password" id="password" name="password" minlength="8" required>
            </div>
            <button type="submit">Potvrdit změny</button>
        </form>
    </div>

    <script>
    </script>
</body>
</html>
